servers:
  web:
    hosts:
      - 195.201.202.110
    proxy:
      host: triaz.odkazprestarostu.sk
    options:
      memory: 8g

  websocket:
    hosts:
      - 195.201.202.110

  worker:
    hosts:
      - 195.201.202.110
    options:
      memory: 4g

proxy:
  host: triaz.odkazprestarostu.sk

env:
  clear:
    WEB_CONCURRENCY: 8
    MAX_THREADS: 15

    OPS_PORTAL_URL: https://novy.odkazprestarostu.sk
    OPS_PORTAL_PUBLIC_URL: https://novy.odkazprestarostu.sk
    FQDN: triaz.odkazprestarostu.sk
    PRODUCT_NAME: Triáž
    ORGANIZATION: Odkaz pre starostu
    ADMIN_EMAIL: <%= ENV.fetch('ADMIN_EMAIL', 'example@example.org') %>
    ADMIN_FIRSTNAME: Superadmin
    ADMIN_LASTNAME: User
    OTHER_RESPONSIBLE_SUBJECT_ID: 410
    Z_LOCALES: "sk:en-us"

    POSTGRESQL_DB: ops_triage_zammad_production
    POSTGRESQL_HOST: host.docker.internal
    POSTGRESQL_USER: ops_triage_zammad
    POSTGRESQL_OPTIONS: "?pool=100"

accessories:
  elastic:
    env:
      clear:
        ES_JAVA_OPTS: "-Xms1024m -Xmx1024m"
    options:
      memory: 4g
  metabase:
    image: metabase/metabase:v0.62.4
    roles:
      - web
      - worker
    proxy:
      host: metabase.odkazprestarostu.sk
      ssl: true
      app_port: 3000
      healthcheck:
        path: /api/health
    env:
      clear:
        MB_DB_TYPE: postgres
        MB_DB_PORT: 5432
        MB_DB_HOST: host.docker.internal
        MB_DB_DBNAME: metabaseappdb
        MB_DB_USER: metabase
      secret:
        - MB_DB_PASS
    options:
      add-host: host.docker.internal:host-gateway
      memory: 3g

ssh:
  user: kamal
